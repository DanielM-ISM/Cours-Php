<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Boutique</title>
    <link rel="stylesheet" href="css/style1.css">
</head>
<body>
    <div class="sidebar">
        
        <div class="user-profile">
            <span>Daniel</span>
        </div>
        
        <div class="logo">
            <img src="images/profile.jpg" alt="">
        </div>

        <ul class="menu">
            <button>
                <li><a href="Accueil.html">Accueuil</a></li>
            </button>
            <button>
                <li><a href="./Dettes.html">Dettes</a></li>
            </button>
            <button>
                <li><a href="./Clients.html">Clients</a></li>
            </button>
            <button>
                <li><a href="./Articles.html">Articles</a></li>
            </button>
            <button>
                <li><a href="./Rapports.html">Rapports</a></li>
            </button>
            <button>
                <li><a href="./Utilisateurs.html">Utilisateurs</a></li>
            </button>
        </ul>
    </div>
    <div class="main-content">

        <div class="header-bar">
            <h2>Gestion des Boutiques</h2>
        </div>
        
        <header>
            <input type="text" placeholder="Rechercher dans votre boutique..." class="search-bar">
        </header>
        <section class="client-list">
            <h1>Lister Clients</h1>
            <div class="filter">
                <input type="text" placeholder="Filtrer par Téléphone">
                <button>OK</button>
                <button class="new-client">Nouvelle Client</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>PRÉNOM ET NOM</th>
                        <th>TÉLÉPHONE</th>
                        <th>ADRESSE</th>
                        <th>PHOTO</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Mr Diouf</td>
                        <td>785619115</td>
                        <td>Dakar, Sénégal</td>
                        <td><img src="images/diouf.jpg" alt="Photo de Mr Diouf" class="client-photo"></td>
                        <td><button class="details-btn">Détails</button></td>
                    </tr>
                    <tr>
                        <td>Mr Lo</td>
                        <td>785619115</td>
                        <td>Thiès, Sénégal</td>
                        <td><img src="images/lo.jpg" alt="Photo de Mr Lo" class="client-photo"></td>
                        <td><button class="details-btn">Détails</button></td>
                    </tr>
                    <tr>
                        <td>Mme Diallo</td>
                        <td>785619115</td>
                        <td>Saint-Louis, Sénégal</td>
                        <td><img src="images/diallo.jpg" alt="Photo de Mme Diallo" class="client-photo"></td>
                        <td><button class="details-btn">Détails</button></td>
                    </tr>
                    <tr>
                        <td>Fatou Diop</td>
                        <td>785619115</td>
                        <td>Kaolack, Sénégal</td>
                        <td><img src="images/diop.jpg" alt="Photo de Fatou Diop" class="client-photo"></td>
                        <td><button class="details-btn">Détails</button></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
</body>
</html>
